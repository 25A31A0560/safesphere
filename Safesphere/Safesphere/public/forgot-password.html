<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - SafeSphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="navbar glass"><a href="/" class="logo" style="text-decoration:none;"><div class="logo-icon"><i class="ph-fill ph-shield-check"></i></div><span>SafeSphere</span></a><nav><ul class="nav-links"><li><a href="/login" class="btn-secondary">Login</a></li><li><a href="/register" class="btn-primary">Get Started</a></li></ul></nav></header>
<main role="main">
<section class="auth-section">
  <div class="auth-container">
    <div class="auth-card glass glow-border">
      <div class="auth-header"><h2>Reset Password</h2><p>Enter your username to receive a reset link.</p></div>
      <div id="fp-msg" class="alert hidden" style="padding:15px;border-radius:8px;margin-bottom:20px;"></div>
      <form id="fp-form" class="auth-form">
        <div class="form-group"><label for="username">Username</label><div class="input-icon"><i class="ph ph-user"></i><input type="text" id="username" name="username" placeholder="Your username" required></div></div>
        <button type="submit" class="btn-primary w-100 mt-4">Send Reset Link <i class="ph ph-arrow-right"></i></button>
      </form>
      <div class="auth-footer mt-4" style="text-align:center;"><a href="/login" class="text-accent">← Back to Login</a></div>
    </div>
  </div>
</section>
</main>
<script>
  document.getElementById('fp-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const msg = document.getElementById('fp-msg');
    msg.className = 'alert';
    msg.style.background = 'rgba(102,252,241,0.1)';
    msg.style.color = 'var(--accent-color)';
    msg.style.border = '1px solid var(--accent-color)';
    msg.textContent = 'Demo mode: Use username "demo" and password "demo123" to login directly.';
    msg.classList.remove('hidden');
  });
</script>
</body>
</html>
